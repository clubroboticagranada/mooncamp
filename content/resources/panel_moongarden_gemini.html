<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Domótico MQTT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #3498db;
            --border-color: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --text-color: #f4f7f6;
            --accent-color: #9b59b6;
            --border-color: #444455;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            background-color: var(--accent-color);
            color: white;
        }

        button:hover { opacity: 0.9; }

        .btn-theme { background-color: #7f8c8d; }
        .btn-record { background-color: #2ecc71; }
        .btn-record.recording { background-color: #e74c3c; }

        .status-text {
            font-weight: bold;
            margin-top: 5px;
            display: block;
        }

        /* Animación de Grabación */
        .rec-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #e74c3c;
            border-radius: 50%;
            margin-left: 10px;
            visibility: hidden;
        }

        .recording .rec-indicator {
            visibility: visible;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.3; transform: scale(1.3); }
        }

        .chart-container {
            position: relative;
            height: 450px;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h2>Panel de Control IoT</h2>
        <button class="btn-theme" onclick="toggleTheme()">Cambiar Tema</button>
    </header>

    <div class="container">
        <div class="card controls">
            <h3>Controles Actuadores</h3>
            <div>
                <button onclick="toggleRiego()">Control Riego</button>
                <span class="status-text">Estado Riego: <span id="status-riego">0 (Auto)</span></span>
            </div>
            <hr style="width:100%; border: 0; border-top: 1px solid var(--border-color)">
            <div>
                <button onclick="toggleUV()">Control Luz UV</button>
                <span class="status-text">Estado UV: <span id="status-uv">0 (Apagado)</span></span>
            </div>
            <hr style="width:100%; border: 0; border-top: 1px solid var(--border-color)">
            <div>
                <button id="btn-csv" class="btn-record" onclick="toggleRecord()">
                    Grabar CSV <span class="rec-indicator"></span>
                </button>
            </div>
            <div id="mqtt-status" style="font-size: 12px; color: gray; margin-top: 20px;">Conectando a MQTT...</div>
        </div>

        <div class="card">
            <h3>Sensores en Tiempo Real</h3>
            <div class="chart-container">
                <canvas id="realtimeChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE ESTADOS ---
        let estadoRiego = 0; // 0, 1, 2
        let estadoUV = 0;    // 0, 1
        let isRecording = false;
        let csvData = [];

        const riegoLabels = {
            0: "0 (Riega si hum. baja)",
            1: "1 (Riega)",
            2: "2 (No riega)"
        };

        // --- CONFIGURACIÓN MQTT ---
        // HiveMQ requiere el path "/mqtt" para WebSockets. El cliente ID debe ser aleatorio para evitar colisiones.
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "/mqtt", "web_client_" + Math.random().toString(16).substr(2, 8));
        
        const mqttOptions = {
            useSSL: true,
            onSuccess: onConnect,
            onFailure: onFailure
        };

        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;
        client.connect(mqttOptions);

        function onConnect() {
            document.getElementById('mqtt-status').innerText = "Conectado a MQTT (broker.hivemq.com)";
            document.getElementById('mqtt-status').style.color = "#2ecc71";
            // Suscribirse a todos los topics de sensores requeridos
            client.subscribe("hi");
            client.subscribe("he");
            client.subscribe("ti");
            client.subscribe("te");
            client.subscribe("lum");
            client.subscribe("hs");
        }

        function onFailure(message) {
            document.getElementById('mqtt-status').innerText = "Error de conexión: " + message.errorMessage;
            document.getElementById('mqtt-status').style.color = "#e74c3c";
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                document.getElementById('mqtt-status').innerText = "Conexión perdida: " + responseObject.errorMessage;
                document.getElementById('mqtt-status').style.color = "#e74c3c";
            }
        }

        // --- ENVIAR DATOS (PUBLICAR) ---
        function publishTopic(topic, payload) {
            if(client.isConnected()) {
                const message = new Paho.MQTT.Message(payload.toString());
                message.destinationName = topic;
                message.retained = true; // Retained opcional para que la placa lea el último estado al arrancar
                client.send(message);
            } else {
                alert("No conectado al broker MQTT");
            }
        }

        function toggleRiego() {
            estadoRiego = (estadoRiego + 1) % 3;
            document.getElementById('status-riego').innerText = riegoLabels[estadoRiego];
            publishTopic("riego", estadoRiego);
        }

        function toggleUV() {
            estadoUV = estadoUV === 0 ? 1 : 0;
            document.getElementById('status-uv').innerText = estadoUV === 1 ? "1 (Encendido)" : "0 (Apagado)";
            publishTopic("ultravioleta", estadoUV);
        }

        // --- RECEPCIÓN DE DATOS Y GRÁFICAS ---
        const ctx = document.getElementById('realtimeChart').getContext('2d');
        
        // Mapeo de topics a datasets del gráfico
        const topicToDatasetIndex = { 'hi': 0, 'he': 1, 'ti': 2, 'te': 3, 'lum': 4, 'hs': 5 };

        const chartData = {
            labels: [], // Guardará las marcas de tiempo (HH:MM:SS)
            datasets: [
                { label: 'Hum. Interior (hi)', data: [], borderColor: '#3498db', tension: 0.2 },
                { label: 'Hum. Exterior (he)', data: [], borderColor: '#2980b9', tension: 0.2 },
                { label: 'Temp. Interior (ti)', data: [], borderColor: '#e67e22', tension: 0.2 },
                { label: 'Temp. Exterior (te)', data: [], borderColor: '#d35400', tension: 0.2 },
                { label: 'Luminosidad (lum)', data: [], borderColor: '#f1c40f', tension: 0.2 },
                { label: 'Hum. Suelo (hs)', data: [], borderColor: '#27ae60', tension: 0.2 }
            ]
        };

        const config = {
            type: 'line',
            data: chartData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { color: () => getComputedStyle(document.documentElement).getPropertyValue('--border-color') } },
                    y: { grid: { color: () => getComputedStyle(document.documentElement).getPropertyValue('--border-color') } }
                }
            }
        };

        const myChart = new Chart(ctx, config);

        function onMessageArrived(message) {
            const topic = message.destinationName;
            const value = parseFloat(message.payloadString);
            
            if (isNaN(value)) return; // Ignorar si no es numérico

            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            const datasetIndex = topicToDatasetIndex[topic];

            if (datasetIndex !== undefined) {
                // Añadir nueva marca de tiempo al eje X si no existe para este segundo
                if (chartData.labels.length === 0 || chartData.labels[chartData.labels.length - 1] !== timeStr) {
                    chartData.labels.push(timeStr);
                    // Limitar gráfica a los últimos 20 datos para que no se sature
                    if (chartData.labels.length > 20) chartData.labels.shift();
                }

                const dataset = chartData.datasets[datasetIndex];
                dataset.data.push(value);
                if (dataset.data.length > 20) dataset.data.shift();

                // Rellenar con nulls los otros datasets para mantener la sincronía visual si es necesario
                chartData.datasets.forEach((d, idx) => {
                    if (idx !== datasetIndex && d.data.length < chartData.labels.length) {
                        // Empareja longitudes empujando el último valor conocido o null
                        d.data.push(d.data[d.data.length - 1] || null);
                        if (d.data.length > 20) d.data.shift();
                    }
                });

                myChart.update('none'); // Actualización suave del gráfico

                // --- GUARDAR EN CSV ---
                if (isRecording) {
                    csvData.push({
                        timestamp: now.toISOString(),
                        topic: topic,
                        value: value
                    });
                }
            }
        }

        // --- GESTIÓN DE CSV ---
        function toggleRecord() {
            const btn = document.getElementById('btn-csv');
            if (!isRecording) {
                // Iniciar grabación
                isRecording = true;
                csvData = [["Timestamp", "Sensor_Topic", "Valor"]]; // Resetear/Iniciar cabecera
                btn.classList.add('recording');
                btn.innerHTML = 'Detener y Descargar CSV <span class="rec-indicator"></span>';
            } else {
                // Detener y procesar descarga
                isRecording = false;
                btn.classList.remove('recording');
                btn.innerHTML = 'Grabar CSV <span class="rec-indicator"></span>';
                downloadCSV();
            }
        }

        function downloadCSV() {
            if (csvData.length <= 1) {
                alert("No se grabaron datos suficientes para generar un archivo CSV.");
                return;
            }
            
            let csvContent = "data:text/csv;charset=utf-8,";
            csvData.forEach(row => {
                let rowStr = Array.isArray(row) ? row.join(",") : `${row.timestamp},${row.topic},${row.value}`;
                csvContent += rowStr + "\r\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `datos_sensores_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- TEMA OSCURO ---
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            
            // Forzar actualización de las rejillas del gráfico al cambiar de color
            myChart.update();
        }
    </script>
</body>
</html>
